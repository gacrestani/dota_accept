# Builds the Windows agent and attaches it to a GitHub release whenever you
# push a tag like v1.0.0. The agent's relay URL comes from the repository
# variable RELAY_URL if set (Settings -> Secrets and variables -> Actions ->
# Variables), otherwise falls back to the tartarus funnel URL.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Build Windows agent
        env:
          RELAY_URL: ${{ vars.RELAY_URL || 'wss://tartarus.taild545f.ts.net' }}
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags "-s -w -X main.defaultRelay=$RELAY_URL" \
            -o dota-accept-agent.exe ./cmd/agent
      - uses: softprops/action-gh-release@v2
        with:
          files: dota-accept-agent.exe
